<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfume Match</title>
  <style>
    :root {
      --bg: #020409;
      --card: rgba(4, 9, 20, .78);
      --soft: rgba(8, 18, 38, .9);
      --text: #f4f8ff;
      --muted: #9eb3d8;
      --accent: #0077ff;
      --accent2: #00c8ff;
      --accent3: #66e7ff;
      --danger: #ff6b6b;
      --radius: 24px;
      --glow: 0 0 28px rgba(0, 119, 255, .45), 0 0 70px rgba(0, 200, 255, .15);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 15% 10%, rgba(0, 119, 255, .22) 0, transparent 28%),
        radial-gradient(circle at 80% 0%, rgba(0, 200, 255, .14) 0, transparent 24%),
        linear-gradient(135deg, #020409 0%, #020711 45%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .34;
      background-image:
        radial-gradient(circle at 8% 14%, rgba(102,231,255,.7) 0 1px, transparent 3px),
        radial-gradient(circle at 18% 72%, rgba(0,119,255,.65) 0 1px, transparent 4px),
        radial-gradient(circle at 28% 34%, rgba(255,255,255,.45) 0 1px, transparent 3px),
        radial-gradient(circle at 44% 18%, rgba(0,200,255,.55) 0 1px, transparent 5px),
        radial-gradient(circle at 58% 68%, rgba(102,231,255,.55) 0 1px, transparent 4px),
        radial-gradient(circle at 74% 26%, rgba(255,255,255,.45) 0 1px, transparent 5px),
        radial-gradient(circle at 86% 80%, rgba(0,119,255,.7) 0 1px, transparent 4px),
        radial-gradient(circle at 94% 12%, rgba(102,231,255,.55) 0 1px, transparent 6px);
      background-size: 360px 360px, 440px 440px, 280px 280px, 520px 520px, 390px 390px, 470px 470px, 330px 330px, 620px 620px;
      filter: drop-shadow(0 0 5px rgba(0, 200, 255, .32));
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(90deg, rgba(0,119,255,.08), transparent 20%, transparent 80%, rgba(0,200,255,.08));
    }

    header {
      padding: 28px 20px;
      max-width: 1120px;
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      position: relative;
      z-index: 1;
    }

    .logo {
      font-weight: 950;
      letter-spacing: -0.06em;
      font-size: 1.9rem;
      text-transform: uppercase;
      font-style: italic;
      text-shadow: 0 0 24px rgba(0,119,255,.45);
    }

    .logo span { color: var(--accent2); }
    .logo::after { content: " ⚡"; color: var(--accent); font-style: normal; }

    .pill {
      border: 1px solid rgba(0, 200, 255, .28);
      background: rgba(0, 20, 50, .45);
      padding: 10px 14px;
      border-radius: 999px;
      color: var(--muted);
      font-size: .9rem;
      box-shadow: inset 0 0 18px rgba(0, 119, 255, .12);
      backdrop-filter: blur(12px);
    }

    main {
      max-width: 1120px;
      margin: auto;
      padding: 10px 20px 60px;
      position: relative;
      z-index: 1;
    }

    .hero {
      display: grid;
      grid-template-columns: 1.1fr .9fr;
      gap: 28px;
      align-items: center;
      margin-top: 26px;
    }

    .hero-card, .quiz-card, .result-card {
      background: linear-gradient(145deg, rgba(4, 11, 26, .86), rgba(0, 0, 0, .62));
      border: 1px solid rgba(0, 200, 255, .20);
      border-radius: var(--radius);
      box-shadow: 0 24px 80px rgba(0,0,0,.55), inset 0 0 30px rgba(0,119,255,.06);
      backdrop-filter: blur(16px);
    }

    .hero-card { padding: 42px; }

    h1 {
      font-size: clamp(2.7rem, 7vw, 5.6rem);
      line-height: .9;
      margin: 0 0 20px;
      letter-spacing: -0.08em;
    }

    .gold { color: var(--accent2); text-shadow: var(--glow); }

    .subtitle {
      color: var(--muted);
      font-size: 1.15rem;
      line-height: 1.6;
      max-width: 650px;
      margin-bottom: 28px;
    }

    button {
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), #004cff 58%, var(--accent2));
      color: white;
      padding: 15px 22px;
      border-radius: 16px;
      font-weight: 850;
      box-shadow: 0 12px 30px rgba(0,119,255,.34), inset 0 0 18px rgba(255,255,255,.16);
    }

    .secondary {
      background: rgba(0, 16, 35, .72);
      color: var(--text);
      padding: 15px 22px;
      border-radius: 16px;
      font-weight: 750;
      border: 1px solid rgba(0, 200, 255, .20);
    }

    .preview {
      padding: 28px;
      min-height: 420px;
      position: relative;
      overflow: hidden;
    }

    .preview::before, .result-card::before, .quiz-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      pointer-events: none;
      border-radius: inherit;
      background: radial-gradient(circle at 80% 10%, rgba(0,200,255,.16), transparent 28%);
    }

    .bottle {
      width: 190px;
      height: 280px;
      border-radius: 32px 32px 18px 18px;
      background: linear-gradient(160deg, rgba(180,235,255,.88), rgba(0,119,255,.35) 35%, rgba(0,0,0,.82));
      margin: 48px auto 20px;
      position: relative;
      transform: rotate(-7deg);
      box-shadow: 0 35px 70px rgba(0,0,0,.55), 0 0 60px rgba(0,119,255,.28);
      border: 1px solid rgba(0,200,255,.28);
    }

    .bottle::before {
      content: "";
      position: absolute;
      width: 74px;
      height: 42px;
      top: -42px;
      left: 58px;
      border-radius: 14px 14px 0 0;
      background: linear-gradient(135deg, #021025, #0077ff);
      border: 1px solid rgba(0,200,255,.32);
    }

    .bottle::after {
      content: "MATCH";
      position: absolute;
      inset: 92px 22px auto;
      text-align: center;
      padding: 18px 0;
      border: 1px solid rgba(102,231,255,.32);
      border-radius: 14px;
      font-weight: 900;
      letter-spacing: .18em;
      color: white;
      text-shadow: 0 0 14px rgba(0,200,255,.85);
    }

    .floating {
      position: absolute;
      padding: 12px 14px;
      background: rgba(0, 8, 20, .58);
      border: 1px solid rgba(0,200,255,.20);
      border-radius: 999px;
      color: var(--text);
      backdrop-filter: blur(14px);
      box-shadow: 0 0 18px rgba(0,119,255,.14);
    }

    .f1 { top: 45px; left: 28px; }
    .f2 { right: 24px; top: 126px; }
    .f3 { bottom: 38px; left: 40px; }

    .hidden { display: none !important; }

    .quiz-wrap { max-width: 820px; margin: 40px auto 0; }
    .quiz-card { padding: 30px; position: relative; overflow: hidden; }

    .progress {
      height: 8px;
      background: rgba(255,255,255,.09);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 26px;
    }

    .bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transition: .25s;
      box-shadow: 0 0 18px rgba(0,200,255,.6);
    }

    .step-label { color: var(--accent2); font-weight: 800; margin-bottom: 8px; }
    h2 { margin: 0 0 18px; font-size: 2rem; letter-spacing: -0.04em; }

    .options { display: grid; gap: 12px; margin-top: 20px; }

    .option {
      background: rgba(0, 12, 30, .72);
      border: 1px solid rgba(255,255,255,.11);
      color: var(--text);
      padding: 18px;
      border-radius: 18px;
      text-align: left;
      transition: .18s ease;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
    }

    .option:hover, .option.selected {
      border-color: rgba(0, 200, 255, .88);
      background: rgba(0, 119, 255, .16);
      transform: translateY(-2px);
      box-shadow: 0 0 24px rgba(0,119,255,.18);
    }

    .option small { color: var(--muted); display: block; margin-top: 4px; }

    .nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 24px;
    }

    .results {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      margin-top: 24px;
    }

    .result-card { padding: 24px; position: relative; overflow: hidden; }
    .rank { color: var(--accent2); font-weight: 900; margin-bottom: 12px; }
    .result-card h3 { margin: 0 0 8px; font-size: 1.35rem; }
    .brand { color: var(--muted); margin-bottom: 16px; }
    .score {
      font-size: 2.1rem;
      font-weight: 950;
      letter-spacing: -0.05em;
      margin: 12px 0;
      color: var(--accent3);
      text-shadow: 0 0 18px rgba(0,200,255,.45);
    }
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin: 16px 0; }
    .tag { background: rgba(0,119,255,.12); border: 1px solid rgba(0,200,255,.18); color: var(--muted); padding: 7px 10px; border-radius: 999px; font-size: .82rem; }
    .why { color: var(--muted); line-height: 1.5; }

    .catalog {
      margin-top: 54px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .mini {
      padding: 16px;
      background: rgba(0, 12, 30, .56);
      border: 1px solid rgba(0,200,255,.12);
      border-radius: 18px;
      backdrop-filter: blur(10px);
    }
    .mini b { display: block; margin-bottom: 4px; }
    .mini span { color: var(--muted); font-size: .9rem; }

    @media (max-width: 860px) {
      .hero { grid-template-columns: 1fr; }
      .results, .catalog { grid-template-columns: 1fr; }
      .hero-card { padding: 28px; }
      header { align-items: flex-start; flex-direction: column; }
    }
</style>
</head>
<body>
  <header>
    <div class="logo">Perfume<span>Match</span></div>
  </header>

  <main>
    <section id="home" class="hero">
      <div class="hero-card">
        <h1>Encuentra tu <span class="gold">perfume ideal</span>.</h1>
        <p class="subtitle">Responde unas preguntas rápidas —o elige “No lo sé” cuando no estés seguro— y recibe 3 recomendaciones según tu estilo, presupuesto, clima y ocasión.</p>
        <button class="primary" onclick="startQuiz()">Empezar test</button>
      </div>
      <div class="hero-card preview">
        <div class="floating f1">🍯 Dulce</div>
        <div class="floating f2">⚡ Azul trueno</div>
        <div class="floating f3">🌲 Amaderado</div>
        <div class="bottle"></div>
      </div>
    </section>

    <section id="quiz" class="quiz-wrap hidden">
      <div class="quiz-card">
        <div class="progress"><div id="bar" class="bar"></div></div>
        <div id="stepLabel" class="step-label"></div>
        <h2 id="question"></h2>
        <div id="options" class="options"></div>
        <div class="nav">
          <button class="secondary" onclick="prevQuestion()">Atrás</button>
          <button id="nextBtn" class="primary" onclick="nextQuestion()">Siguiente</button>
        </div>
      </div>
    </section>

    <section id="results" class="hidden">
      <div class="hero-card">
        <h2>Tus recomendaciones</h2>
        <p class="subtitle" id="summary"></p>
        <div id="resultGrid" class="results"></div>
        <div class="nav">
          <button class="secondary" onclick="restart()">Hacer test otra vez</button>
        </div>
      </div>
    </section>

    <section class="catalog" id="catalog"></section>
  </main>

  <script>
    const perfumes = [
      { name: "Y Eau de Parfum", brand: "Yves Saint Laurent", price: 3, tags:["fresco","versátil","juvenil"], profile:{fresh:9,sweet:5,woody:6,citrus:7,school:9,work:9,date:8,party:8,heat:7,cold:6,discreet:6,loud:7,elegant:7,popular:9,mysterious:5} },
      { name: "Le Male Elixir", brand: "Jean Paul Gaultier", price: 3, tags:["dulce","fiesta","potente"], profile:{fresh:2,sweet:10,woody:6,citrus:1,school:4,work:4,date:9,party:10,heat:2,cold:10,discreet:2,loud:10,elegant:7,popular:9,mysterious:7} },
      { name: "Bleu de Chanel EDP", brand: "Chanel", price: 4, tags:["elegante","fresco","seguro"], profile:{fresh:8,sweet:3,woody:8,citrus:7,school:8,work:10,date:8,party:7,heat:7,cold:7,discreet:8,loud:6,elegant:10,popular:7,mysterious:6} },
      { name: "Sauvage Elixir", brand: "Dior", price: 4, tags:["potente","especiado","noche"], profile:{fresh:5,sweet:5,woody:8,citrus:4,school:4,work:6,date:9,party:10,heat:2,cold:10,discreet:1,loud:10,elegant:8,popular:8,mysterious:8} },
      { name: "The Most Wanted Parfum", brand: "Azzaro", price: 3, tags:["dulce","citas","invierno"], profile:{fresh:2,sweet:9,woody:7,citrus:1,school:5,work:5,date:10,party:9,heat:2,cold:9,discreet:3,loud:9,elegant:7,popular:9,mysterious:7} },
      { name: "Born in Roma Intense", brand: "Valentino", price: 3, tags:["vainilla","juvenil","noche"], profile:{fresh:4,sweet:9,woody:5,citrus:3,school:6,work:6,date:9,party:9,heat:3,cold:8,discreet:4,loud:8,elegant:7,popular:10,mysterious:6} },
      { name: "Explorer", brand: "Montblanc", price: 2, tags:["aventus vibe","fresco","barato"], profile:{fresh:8,sweet:3,woody:7,citrus:8,school:9,work:8,date:7,party:7,heat:8,cold:5,discreet:7,loud:6,elegant:7,popular:7,mysterious:5} },
      { name: "Eros EDP", brand: "Versace", price: 2, tags:["fiesta","dulce","juvenil"], profile:{fresh:5,sweet:8,woody:5,citrus:5,school:6,work:4,date:8,party:10,heat:4,cold:7,discreet:3,loud:9,elegant:5,popular:9,mysterious:4} },
      { name: "Luna Rossa Black", brand: "Prada", price: 3, tags:["limpio","dulce","discreto"], profile:{fresh:6,sweet:7,woody:6,citrus:3,school:8,work:9,date:8,party:6,heat:6,cold:7,discreet:9,loud:4,elegant:8,popular:6,mysterious:7} },
      { name: "Dylan Blue", brand: "Versace", price: 2, tags:["fresco","diario","seguro"], profile:{fresh:8,sweet:4,woody:7,citrus:7,school:9,work:8,date:7,party:7,heat:8,cold:5,discreet:7,loud:6,elegant:6,popular:8,mysterious:4} },
      { name: "Acqua di Gio Profondo", brand: "Giorgio Armani", price: 3, tags:["acuático","calor","limpio"], profile:{fresh:10,sweet:2,woody:5,citrus:7,school:9,work:8,date:7,party:6,heat:10,cold:3,discreet:8,loud:5,elegant:7,popular:7,mysterious:4} },
      { name: "Stronger With You Intensely", brand: "Armani", price: 3, tags:["dulce","invierno","citas"], profile:{fresh:1,sweet:10,woody:5,citrus:1,school:4,work:5,date:9,party:8,heat:1,cold:10,discreet:3,loud:8,elegant:7,popular:8,mysterious:6} },
      { name: "Club de Nuit Intense Man", brand: "Armaf", price: 1, tags:["potente","cítrico","económico"], profile:{fresh:7,sweet:3,woody:8,citrus:9,school:7,work:7,date:7,party:8,heat:7,cold:6,discreet:3,loud:9,elegant:6,popular:7,mysterious:5} },
      { name: "Nautica Voyage", brand: "Nautica", price: 1, tags:["barato","fresco","escuela"], profile:{fresh:9,sweet:2,woody:3,citrus:6,school:10,work:6,date:5,party:4,heat:10,cold:2,discreet:8,loud:3,elegant:4,popular:6,mysterious:2} },
      { name: "Dior Homme Intense", brand: "Dior", price: 4, tags:["elegante","iris","especial"], profile:{fresh:2,sweet:7,woody:8,citrus:1,school:3,work:8,date:10,party:8,heat:1,cold:9,discreet:5,loud:7,elegant:10,popular:6,mysterious:9} }
    ];

    const questions = [
      { q:"¿Qué tipo de aroma prefieres?", key:"scent", options:[
        {label:"Dulce", desc:"Vainilla, ámbar, canela, miel", weights:{sweet:4}},
        {label:"Fresco", desc:"Limpio, acuático, recién bañado", weights:{fresh:4}},
        {label:"Amaderado", desc:"Elegante, masculino, más serio", weights:{woody:4}},
        {label:"Cítrico", desc:"Limón, bergamota, naranja", weights:{citrus:4}},
        {label:"No lo sé", desc:"Aún no tengo preferencia", weights:{fresh:1,sweet:1,woody:1,citrus:1}}
      ]},
      { q:"¿Para qué lo quieres usar principalmente?", key:"occasion", options:[
        {label:"Escuela / diario", desc:"Algo agradable y no invasivo", weights:{school:4}},
        {label:"Trabajo", desc:"Limpio, serio y profesional", weights:{work:4}},
        {label:"Citas", desc:"Atractivo y memorable", weights:{date:4}},
        {label:"Fiestas", desc:"Que proyecte y destaque", weights:{party:4}},
        {label:"No lo sé", desc:"Recomiéndame algo versátil", weights:{school:2,work:2,date:1,party:1}}
      ]},
      { q:"¿En qué clima lo usarías más?", key:"weather", options:[
        {label:"Calor", desc:"Fresco, ligero, que no empalague", weights:{heat:4,fresh:1,citrus:1}},
        {label:"Frío", desc:"Dulce, intenso, más nocturno", weights:{cold:4,sweet:1}},
        {label:"Todo el año", desc:"Versátil", weights:{heat:2,cold:2,fresh:1}},
        {label:"No lo sé", desc:"Que funcione en la mayoría de climas", weights:{heat:2,cold:2}}
      ]},
      { q:"¿Qué tan fuerte quieres que huela?", key:"intensity", options:[
        {label:"Discreto", desc:"Que huela bien de cerca", weights:{discreet:4}},
        {label:"Equilibrado", desc:"Que se note sin molestar", weights:{discreet:2,loud:2}},
        {label:"Muy llamativo", desc:"Que todos lo noten", weights:{loud:4}},
        {label:"No lo sé", desc:"Un punto medio seguro", weights:{discreet:2,loud:2}}
      ]},
      { q:"¿Qué imagen quieres proyectar?", key:"vibe", options:[
        {label:"Elegante", desc:"Formal, limpio, caro", weights:{elegant:4}},
        {label:"Popular", desc:"Juvenil, cumplidor, gusta fácil", weights:{popular:4}},
        {label:"Misterioso", desc:"Más nocturno y diferente", weights:{mysterious:4}},
        {label:"Seguro para todo", desc:"Difícil fallar", weights:{school:2,work:2,fresh:1}},
        {label:"No lo sé", desc:"Algo que le guste a la mayoría", weights:{popular:2,elegant:1,school:1,work:1}}
      ]},
      { q:"¿Cuál es tu presupuesto aproximado?", key:"budget", options:[
        {label:"Menos de $1,500", desc:"Opciones económicas", budget:1},
        {label:"$1,500 - $3,000", desc:"Diseñador accesible", budget:2},
        {label:"$3,000 - $5,000", desc:"Gama alta diseñador", budget:3},
        {label:"Más de $5,000", desc:"Premium / lujo", budget:4},
        {label:"No lo sé", desc:"Muéstrame buenas opciones sin cerrarme", budget:3}
      ]}
    ];

    let current = 0;
    let answers = [];

    function startQuiz(){
      document.getElementById('home').classList.add('hidden');
      document.getElementById('results').classList.add('hidden');
      document.getElementById('quiz').classList.remove('hidden');
      current = 0; answers = [];
      renderQuestion();
    }

    function renderQuestion(){
      const step = questions[current];
      document.getElementById('bar').style.width = `${((current) / questions.length) * 100}%`;
      document.getElementById('stepLabel').textContent = `Pregunta ${current + 1} de ${questions.length}`;
      document.getElementById('question').textContent = step.q;
      document.getElementById('nextBtn').textContent = current === questions.length - 1 ? 'Ver resultados' : 'Siguiente';
      const box = document.getElementById('options');
      box.innerHTML = '';
      step.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'option' + (answers[current] === i ? ' selected' : '');
        btn.innerHTML = `<div><strong>${opt.label}</strong><small>${opt.desc}</small></div><span>→</span>`;
        btn.onclick = () => { answers[current] = i; renderQuestion(); };
        box.appendChild(btn);
      });
    }

    function nextQuestion(){
      if (answers[current] === undefined) {
        alert('Elige una opción para continuar.');
        return;
      }
      if (current < questions.length - 1) { current++; renderQuestion(); }
      else showResults();
    }

    function prevQuestion(){
      if (current > 0) { current--; renderQuestion(); }
      else {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('home').classList.remove('hidden');
      }
    }

    function showResults(){
      const selected = answers.map((idx, qIndex) => questions[qIndex].options[idx]);
      const budget = selected.find(o => o.budget)?.budget || 4;
      const scored = perfumes.map(p => {
        let score = 0;
        selected.forEach(ans => {
          if (ans.weights) {
            Object.entries(ans.weights).forEach(([key, weight]) => score += (p.profile[key] || 0) * weight);
          }
          if (ans.budget) {
            const diff = Math.abs(p.price - budget);
            score += Math.max(0, 25 - diff * 8);
          }
        });
        return { ...p, score };
      }).sort((a,b) => b.score - a.score).slice(0,3);

      const maxScore = scored[0].score || 1;
      document.getElementById('quiz').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
      document.getElementById('bar').style.width = `100%`;

      const summaryWords = selected.map(x => x.label).join(' · ');
      document.getElementById('summary').textContent = `Según tus respuestas: ${summaryWords}. Estos son los perfumes que mejor encajan contigo.`;

      const grid = document.getElementById('resultGrid');
      grid.innerHTML = '';
      scored.forEach((p, i) => {
        const percent = Math.round((p.score / maxScore) * 96);
        const card = document.createElement('div');
        card.className = 'result-card';
        card.innerHTML = `
          <div class="rank">#${i + 1} recomendación</div>
          <h3>${p.name}</h3>
          <div class="brand">${p.brand}</div>
          <div class="score">${percent}%</div>
          <div class="tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <p class="why">Te queda porque combina con tu ocasión, tipo de aroma, intensidad y presupuesto. Ideal para probarlo antes de comprar botella completa.</p>
        `;
        grid.appendChild(card);
      });
    }

    function restart(){ startQuiz(); }

    function renderCatalog(){
      const catalog = document.getElementById('catalog');
      catalog.innerHTML = perfumes.map(p => `<div class="mini"><b>${p.name}</b><span>${p.brand} · ${p.tags.join(', ')}</span></div>`).join('');
    }

    renderCatalog();
  </script>
</body>
</html>
